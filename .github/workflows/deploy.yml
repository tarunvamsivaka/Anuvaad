name: Deploy to Production

# FIX-15 (P2-07): CD pipeline — deploys to production on every push to master
# after CI passes. Uses Docker image tagging by Git SHA for reproducible rollbacks.
#
# Required GitHub Secrets:
#   PROD_HOST        — production server hostname/IP
#   PROD_SSH_KEY     — private SSH key for the deployment user
#   DOCKER_USERNAME  — container registry username (or github.actor for GHCR)
#   DOCKER_PASSWORD  — container registry password / GitHub PAT (packages:write)
#
# Required GitHub Variables (non-secret):
#   DOCKER_REGISTRY  — e.g., ghcr.io  (default: ghcr.io)
#   PROD_USER        — SSH user on production server (default: deploy)
#   NEXT_PUBLIC_API_URL — e.g., https://api.getanuvaad.com

on:
  push:
    branches: [master]   # FIX: was 'main', repo default branch is 'master'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to latest SHA)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  # ── Build & Push Docker Images ──────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Determine image tag
        id: meta
        run: |
          SHA_TAG="${{ github.sha }}"
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHA_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-api:${{ steps.meta.outputs.sha_tag }}
            ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-frontend:${{ steps.meta.outputs.sha_tag }}
            ${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.getanuvaad.com' }}

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false  # Never cancel an in-flight deploy
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ vars.PROD_USER || 'deploy' }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            export IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
            export DOCKER_REGISTRY="${{ vars.DOCKER_REGISTRY }}"
            export REPO="${{ github.repository }}"

            echo "==> Pulling new images (tag: ${IMAGE_TAG})"
            docker pull "${DOCKER_REGISTRY}/${REPO}-api:${IMAGE_TAG}"
            docker pull "${DOCKER_REGISTRY}/${REPO}-frontend:${IMAGE_TAG}"

            echo "==> Updating image tags in compose override"
            cd ~/anuvaad
            cat > docker-compose.override.yml <<EOF
            services:
              api:
                image: ${DOCKER_REGISTRY}/${REPO}-api:${IMAGE_TAG}
              worker:
                image: ${DOCKER_REGISTRY}/${REPO}-api:${IMAGE_TAG}
              beat:
                image: ${DOCKER_REGISTRY}/${REPO}-api:${IMAGE_TAG}
              frontend:
                image: ${DOCKER_REGISTRY}/${REPO}-frontend:${IMAGE_TAG}
            EOF

            echo "==> Rolling update (zero-downtime)"
            docker compose -f docker-compose.prod.yml -f docker-compose.override.yml \
              up -d --no-deps --wait api worker beat frontend

            echo "==> Waiting for health checks (30s)"
            sleep 30

            echo "==> Health check"
            docker compose -f docker-compose.prod.yml ps
            curl -sf http://localhost:8000/api/health | python3 -m json.tool

            echo "==> Deployment complete: ${IMAGE_TAG}"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ vars.PROD_USER || 'deploy' }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "==> DEPLOY FAILED — rolling back to :latest"
            cd ~/anuvaad
            # Remove override so compose falls back to docker-compose.prod.yml defaults
            rm -f docker-compose.override.yml
            docker compose -f docker-compose.prod.yml up -d --no-deps api worker beat frontend
            echo "==> Rollback complete"
