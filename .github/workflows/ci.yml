name: Anuvaad CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]  # L-01: Added 3.13 to match local env

    # L-02: Start Redis so Redis-backed features are tested in CI (not just gracefully skipped)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx "pytest-asyncio>=1.0.0,<2.0.0" structlog aiosqlite

      - name: Run tests
        env:
          GROQ_API_KEY: test_key_for_ci
          DEEPSEEK_API_KEY: test_key_for_ci
          TESTING: "true"
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder_key_for_ci
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_key_for_ci
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379
        run: |
          pytest tests/ -v --tb=short

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln GHSA-x7gm-x3g3-g6xq --progress-spinner off
        # Note: Added targeted ignores for known issues.

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linters
        run: pip install ruff

      - name: Lint Python
        run: ruff check main.py app/ tests/ --select E,F,W --ignore E501,F401

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Typecheck TypeScript
        run: cd frontend && npx tsc --noEmit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_ci_build
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Run Vitest unit tests
        run: npx vitest run

      - name: Security audit (npm audit)
        run: npm audit --audit-level=high
        # Note: Add exclusions via overrides in package.json if needed

      - name: Lint frontend
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_ci_build
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Copy static assets for standalone server
        # `node .next/standalone/server.js` does NOT auto-include .next/static or public.
        # We must copy them so the standalone server serves CSS/JS/images correctly.
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          mkdir -p .next/standalone/public
          cp -r public/. .next/standalone/public/

      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_ci_build
          NEXT_PUBLIC_API_URL: http://localhost:8000
          PLAYWRIGHT_TEST_EMAIL: test@example.com
          PLAYWRIGHT_TEST_PASSWORD: password123
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint, frontend, e2e]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t anuvaad:latest .

      - name: Verify container health
        run: |
          docker run -d --name anuvaad-test \
            -e GROQ_API_KEY=test_key \
            -e DEEPSEEK_API_KEY=test_key \
            -p 8000:8000 \
            anuvaad:latest
          
          echo "Waiting for container to become healthy..."
          success=false
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/api/health > /dev/null; then
              echo "Container is healthy!"
              success=true
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 1
          done
          
          if [ "$success" = false ]; then
            echo "❌ Container health check failed! Fetching logs:"
            docker logs anuvaad-test
            exit 1
          fi
          
          docker stop anuvaad-test

  # L-03: VSCode extension CI — typecheck + lint (was entirely absent from CI)
  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present || true  # non-blocking until lint config is added
