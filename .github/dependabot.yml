version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "backend"
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "frontend"
      - "dependencies"
    groups:
      # React + react-dom MUST be bumped together — mismatched versions cause
      # build failures ("Incompatible React versions" error in Vitest).
      # Grouping ensures Dependabot opens ONE PR for all React packages.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      # TypeScript major versions require explicit project compatibility review.
      # TypeScript 6 dropped support for older lib targets and has breaking
      # compiler changes. Manually review before upgrading.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Next.js major versions can have significant breaking API changes.
      # Review release notes carefully before upgrading.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # React major versions require coordinated frontend/dependency updates.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # ESLint 10 breaks eslint-plugin-react:
      # "contextOrFilename.getFilename is not a function"
      # The plugin requires manual ESLint 10 compatibility review first.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deployment"
      - "dependencies"
