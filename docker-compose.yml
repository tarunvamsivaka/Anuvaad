services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # INFRA-02: Redis authentication via environment variable
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes;
        else
          redis-server --appendonly yes;
        fi
      "
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # INFRA-03: Health check uses password when set
    healthcheck:
      test: |
        sh -c "
          if [ -n \"$$REDIS_PASSWORD\" ]; then
            redis-cli -a \"$$REDIS_PASSWORD\" ping;
          else
            redis-cli ping;
          fi
        "
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # INFRA-03: Backend health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build: .
    command: celery -A app.queue.celery_config.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # INFRA-04: NEXT_PUBLIC_API_URL must be the PUBLIC URL clients use from their browsers.
      # Set to your domain in production (e.g., https://api.anuvaad.dev).
      # http://backend:8000 is an internal Docker URL — it works for SSR but NOT for
      # browser-side fetch calls. Override via .env or CI/CD environment.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # INFRA-03: Frontend health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  redis_data:
