services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./sw.js:/usr/share/nginx/html/sw.js:ro
      - ./manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./icon-512.png:/usr/share/nginx/html/icon-512.png:ro
      - ./robots.txt:/usr/share/nginx/html/robots.txt:ro
      - ./sitemap.xml:/usr/share/nginx/html/sitemap.xml:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
